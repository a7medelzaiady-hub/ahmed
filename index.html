<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>منصة تعلم الإنجليزية</title>
    <!-- تضمين الخطوط -->
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body { margin: 0; font-family: 'Cairo', sans-serif; background: #f0f2f5; }
        
        /* الصفحة الرئيسية */
        #home-page { 
            display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh;
        }
        .card { 
            background: white; padding: 40px; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); 
            text-align: center; cursor: pointer; transition: 0.3s; border: 2px solid #4f46e5;
        }
        .card:hover { transform: scale(1.05); }

        /* صفحة الاختبار (مخفية مبدئياً) */
        #quiz-page { display: none; padding: 20px; }
    </style>
</head>
<body>

    <!-- الصفحة الرئيسية -->
    <div id="home-page">
        <h1>مرحباً بك في موقعي التعليمي 👌</h1>
        <div class="card" onclick="showQuiz()">
            <h2>اضغط هنا لبدء الاختبار</h2>
            <p>100 سؤال في القواعد</p>
        </div>
    </div>

    <!-- صفحة الاختبار -->
    <div id="quiz-page">
        <!-- هنا سيتم تحميل محتوى الاختبار برمجياً -->
    </div>

    <script>
        function showQuiz() {
            // إخفاء الصفحة الرئيسية
            document.getElementById('home-page').style.display = 'none';
            // إظهار صفحة الاختبار
            document.getElementById('quiz-page').style.display = 'block';
            
            // حقن كود الاختبار (لتجنب تداخل الأكواد)
            document.getElementById('quiz-page').innerHTML = `
                <div style="text-align:center; padding: 20px;">
                    <h2>جاري تحميل الأسئلة...</h2>
                    <button onclick="location.reload()" style="padding:10px 20px; cursor:pointer;">العودة للرئيسية</button>
                </div>
            `;
            
            // ملاحظة: لضمان عمل الـ 100 سؤال، يفضل أن يكون لديك ملف اسمه quiz.html 
            // وسنقوم بتحويلك إليه فور الضغط:
            window.location.href = 'grammar_quiz.html'; 
        }
    </script>
</body>
</html>
