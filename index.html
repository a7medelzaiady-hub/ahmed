<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>بوابة العباقرة - التحدي الشامل</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;800;900&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Cairo', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
            color: #fff;
            transition: background 0.5s ease;
        }

        .container { width: 100%; max-width: 800px; text-align: center; }

        /* ==================== الصفحة الرئيسية ==================== */
        #landing-page { animation: fadeIn 1s ease-out; }

        .header-text { margin-bottom: 30px; }
        .header-text h1 { font-size: 2.8rem; font-weight: 900; margin-bottom: 15px; text-shadow: 0 4px 15px rgba(0,0,0,0.2); }
        .header-text h1 span { color: #ffd700; }
        .header-text p { font-size: 1.1rem; opacity: 0.9; line-height: 1.6; max-width: 600px; margin: 0 auto; }

        .features { display: flex; justify-content: center; flex-wrap: wrap; gap: 10px; margin-bottom: 30px; }
        .badge {
            background: rgba(255, 255, 255, 0.2); backdrop-filter: blur(10px);
            padding: 8px 15px; border-radius: 50px; font-weight: 600; font-size: 0.9rem;
            border: 1px solid rgba(255, 255, 255, 0.3); display: flex; align-items: center; gap: 5px;
        }

        .start-card {
            background: #ffffff; color: #333; padding: 35px 25px; border-radius: 25px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.3); max-width: 400px; margin: 0 auto;
            border: 4px solid transparent; 
        }
        
        .name-input {
            width: 100%; padding: 15px; font-size: 1.1rem; font-family: 'Cairo', sans-serif;
            border: 2px solid #e2e8f0; border-radius: 12px; margin-bottom: 20px;
            text-align: center; outline: none; transition: 0.3s;
        }
        .name-input:focus { border-color: #4f46e5; box-shadow: 0 0 0 4px rgba(79,70,229,0.1); }

        .start-btn {
            width: 100%; display: block;
            background: linear-gradient(135deg, #4f46e5 0%, #7c3aed 100%);
            color: white; padding: 15px; border-radius: 12px; border: none; cursor: pointer;
            font-size: 1.2rem; font-weight: 700; font-family: 'Cairo', sans-serif;
            box-shadow: 0 10px 20px rgba(79, 70, 229, 0.3); transition: 0.2s;
        }
        .start-btn:active { transform: translateY(5px); box-shadow: 0 5px 10px rgba(79, 70, 229, 0.3); }

        /* ==================== صفحة الاختبار ==================== */
        #quiz-page { display: none; max-width: 650px; margin: 0 auto; }
        
        .quiz-card {
            background: #ffffff; padding: 25px 20px; border-radius: 25px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.1); border-bottom: 6px solid #4f46e5;
            text-align: center; color: #1e293b;
        }

        /* لوحة التحكم */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(130px, 1fr));
            gap: 10px;
            margin-bottom: 20px;
        }

        .stat-item {
            background: #e0e7ff; color: #4f46e5; padding: 10px;
            border-radius: 10px; font-weight: 700; font-size: 0.9rem;
            display: flex; align-items: center; justify-content: center; gap: 5px;
        }

        .action-btn { cursor: pointer; transition: all 0.2s; border: 1px solid transparent; user-select: none; }
        .action-btn:active { transform: scale(0.95); }
        
        .end-btn { background: #fef3c7; color: #d97706; }
        .end-btn:hover { background: #fde68a; }
        
        .restart-btn { background: #fee2e2; color: #ef4444; }
        .restart-btn:hover { background: #fca5a5; }

        .question-text { font-size: 1.3rem; font-weight: 900; margin-bottom: 20px; direction: ltr; color: #0f172a; }
        
        .options-grid { display: flex; flex-direction: column; gap: 10px; }
        
        .option-btn {
            background: #f8fafc; border: 2px solid #cbd5e1; color: #334155;
            padding: 15px; font-size: 1.1rem; font-weight: 700; border-radius: 12px;
            cursor: pointer; text-align: left; direction: ltr;
            box-shadow: 0 4px 0 #cbd5e1; transition: all 0.1s; font-family: sans-serif;
        }
        .option-btn:active { transform: translateY(4px); box-shadow: 0 0 0 transparent; }
        .option-btn.correct { background: #10b981; color: white; border-color: #10b981; box-shadow: 0 4px 0 #047857; }
        .option-btn.incorrect { background: #ef4444; color: white; border-color: #ef4444; box-shadow: 0 4px 0 #b91c1c; }

        .explanation {
            margin-top: 15px; background: #ecfdf5; color: #065f46;
            padding: 15px; border-radius: 12px; font-weight: 600; display: none;
            animation: fadeIn 0.4s;
        }

        .motivational-msg {
            display: block; font-size: 1.2rem; font-weight: 900; 
            color: #10b981; margin-bottom: 5px; animation: popIn 0.3s;
        }

        .next-btn {
            margin-top: 15px; width: 100%; background: #4f46e5; color: white;
            border: none; padding: 15px; font-size: 1.2rem; font-weight: 700;
            border-radius: 12px; cursor: pointer; display: none; font-family: 'Cairo', sans-serif;
            box-shadow: 0 6px 0 #312e81; transition: 0.1s;
        }
        .next-btn:active { transform: translateY(6px); box-shadow: 0 0 0 transparent; }

        /* الأنيميشن */
        @keyframes fadeIn { from { opacity: 0; transform: translateY(15px); } to { opacity: 1; transform: translateY(0); } }
        @keyframes popIn { 0% { transform: scale(0.5); opacity: 0; } 100% { transform: scale(1); opacity: 1; } }
        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            20%, 60% { transform: translateX(-10px); }
            40%, 80% { transform: translateX(10px); }
        }
        .shake-anim { animation: shake 0.4s ease-in-out; }
    </style>
</head>
<body>

    <!-- ==================== الصفحة الرئيسية ==================== -->
    <div id="landing-page" class="container">
        <div class="header-text">
            <h1>مرحباً يا بطل في <span>التحدي الأكبر</span></h1>
            <p>سجل اسمك بالأسفل لتبدأ رحلتك نحو الاحتراف في اللغة الإنجليزية!</p>
        </div>

        <div class="features">
            <span class="badge">🔥 200 سؤال</span>
            <span class="badge">⏱️ حفظ تلقائي للتقدم</span>
            <span class="badge">🔊 مؤثرات تفاعلية</span>
        </div>

        <div class="start-card">
            <input type="text" id="user-name" class="name-input" placeholder="أدخل اسمك الكريم هنا..." required>
            <button class="start-btn" onclick="startAwesomeQuiz()">دخول قاعة الاختبار 🚀</button>
        </div>
    </div>

    <!-- ==================== صفحة الاختبار ==================== -->
    <div id="quiz-page" class="container">
        <div class="quiz-card" id="quiz-card-box">
            
            <!-- لوحة التحكم -->
            <div class="stats-grid">
                <div class="stat-item" id="score-display">⭐ النقاط: 0</div>
                <div class="stat-item" id="progress-display">📝 سؤال 1</div>
                <div class="stat-item" id="timer-display">⏱️ 00:00</div>
                <div class="stat-item action-btn end-btn" onclick="endQuizEarly()">⏹️ إنهاء الاختبار</div>
                <div class="stat-item action-btn restart-btn" onclick="requestRestart()">🔄 إعادة (بكلمة مرور)</div>
            </div>
            
            <div class="question-text" id="q-text">Loading...</div>
            <div class="options-grid" id="options-box"></div>
            <div class="explanation" id="explanation-box"></div>
            <button class="next-btn" id="next-btn" onclick="nextQuestion()">السؤال التالي ➡️</button>
        </div>
    </div>

    <!-- ==================== الجافاسكريبت ==================== -->
    <script>
        // المتغيرات الأساسية
        let userName = "";
        let quizQuestions = [];
        let currentIndex = 0;
        let score = 0;
        let answered = false;
        let elapsedSeconds = 0;
        let timerInterval;

        // إعدادات الصوت والاهتزاز
        let audioCtx;
        function initAudio() {
            if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        }

        function playSound(type) {
            if (!audioCtx) return;
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.connect(gain); gain.connect(audioCtx.destination);
            if (type === 'correct') {
                osc.type = 'sine'; osc.frequency.setValueAtTime(800, audioCtx.currentTime);
                osc.frequency.exponentialRampToValueAtTime(1200, audioCtx.currentTime + 0.1);
                gain.gain.setValueAtTime(1, audioCtx.currentTime);
                gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.5);
                osc.start(); osc.stop(audioCtx.currentTime + 0.5);
            } else {
                osc.type = 'sawtooth'; osc.frequency.setValueAtTime(150, audioCtx.currentTime);
                osc.frequency.exponentialRampToValueAtTime(80, audioCtx.currentTime + 0.3);
                gain.gain.setValueAtTime(1, audioCtx.currentTime);
                gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.5);
                osc.start(); osc.stop(audioCtx.currentTime + 0.5);
            }
        }

        function triggerVibration(type) {
            if (!navigator.vibrate) return;
            if (type === 'correct') navigator.vibrate([100]);
            else navigator.vibrate([300, 100, 300]);
        }

        // إعداد المؤقت
        function startTimer() {
            clearInterval(timerInterval);
            timerInterval = setInterval(() => {
                elapsedSeconds++;
                let m = Math.floor(elapsedSeconds / 60).toString().padStart(2, '0');
                let s = (elapsedSeconds % 60).toString().padStart(2, '0');
                document.getElementById('timer-display').innerText = `⏱️ ${m}:${s}`;
                saveState(); // حفظ الوقت المستغرق
            }, 1000);
        }

        function formatTime(totalSeconds) {
            let m = Math.floor(totalSeconds / 60);
            let s = totalSeconds % 60;
            return `${m > 0 ? m + ' دقيقة و ' : ''}${s} ثانية`;
        }

        // الرسائل التحفيزية
        const motivations = ["🔥 بطل!", "⭐ ممتاز!", "💪 عاش!", "🌟 رائع!", "🎯 دقيق جداً!", "👑 أسطورة!"];

        // قاعدة الأسئلة (سيتم مضاعفتها وخلطها لـ 200 سؤال)
        const rawQuestions = [
            {q: "___ am a smart English student.", o: ["He", "She", "I", "They"], c: 2, e: "I هو ضمير المتكلم ويأتي مع am."},
            {q: "My brother is tall. ___ plays basketball.", o: ["She", "He", "It", "We"], c: 1, e: "He تعود على المفرد المذكر."},
            {q: "I would like some ___ in my coffee.", o: ["sugar", "sugars", "a sugar", "many sugar"], c: 0, e: "السكر اسم غير معدود لا يجمع."},
            {q: "He is ___ honest man.", o: ["a", "an", "the", "zero"], c: 1, e: "حرف h صامت، والكلمة تبدأ بصوت متحرك فنستخدم an."},
            {q: "I bought ___ new smartphone yesterday.", o: ["a", "an", "the", "zero"], c: 0, e: "الاسم نكرة ومفرد ويبدأ بحرف ساكن."},
            {q: "There are many ___ playing in the park.", o: ["childs", "child", "children", "childrens"], c: 2, e: "جمع كلمة child هو children (جمع شاذ)."},
            {q: "___ Sun is very hot today.", o: ["A", "An", "The", "zero"], c: 2, e: "الأشياء الفريدة في الكون نستخدم معها The."},
            {q: "How ___ water do you drink?", o: ["many", "much", "few", "a"], c: 1, e: "نسأل عن الكمية غير المعدودة بـ much."},
            {q: "The cat is sleeping. ___ looks peaceful.", o: ["It", "They", "He", "She"], c: 0, e: "It تعود على المفرد غير العاقل (القطة)."},
            {q: "Do you have ___ free time today?", o: ["many", "any", "few", "a"], c: 1, e: "نستخدم any في السؤال مع الأسماء غير المعدودة."}
            // يمكن إضافة المزيد هنا
        ];

        // تهيئة وحفظ الحالة LocalStorage
        function generateQuestions() {
            let arr = [];
            for(let i=0; i<20; i++) { // مضاعفة للوصول لـ 200 سؤال
                let shuffled = [...rawQuestions].sort(() => Math.random() - 0.5);
                arr = arr.concat(shuffled);
            }
            return arr;
        }

        function saveState() {
            const state = { userName, quizQuestions, currentIndex, score, elapsedSeconds };
            localStorage.setItem('SuperQuizState', JSON.stringify(state));
        }

        function loadState() {
            const saved = localStorage.getItem('SuperQuizState');
            if (saved) {
                const state = JSON.parse(saved);
                userName = state.userName;
                quizQuestions = state.quizQuestions;
                currentIndex = state.currentIndex;
                score = state.score;
                elapsedSeconds = state.elapsedSeconds || 0;
                return true;
            }
            return false;
        }

        // التحقق عند فتح الصفحة (إذا كان هناك جلسة محفوظة)
        window.onload = () => {
            if (loadState() && currentIndex < quizQuestions.length) {
                // تخطي الشاشة الرئيسية والدخول للاختبار مباشرة
                document.getElementById('landing-page').style.display = 'none';
                document.getElementById('quiz-page').style.display = 'block';
                document.body.style.background = '#eef2f6';
                startTimer();
                loadQuestion();
            }
        };

        // زر البداية من شاشة الترحيب
        function startAwesomeQuiz() {
            const nameInput = document.getElementById('user-name').value.trim();
            if(nameInput === "") {
                alert("يرجى إدخال اسمك أولاً لبدء الاختبار!");
                return;
            }
            userName = nameInput;
            quizQuestions = generateQuestions();
            currentIndex = 0;
            score = 0;
            elapsedSeconds = 0;
            
            initAudio(); 
            saveState();

            document.getElementById('landing-page').style.display = 'none'; 
            document.getElementById('quiz-page').style.display = 'block'; 
            document.body.style.background = '#eef2f6'; 
            
            startTimer();
            loadQuestion();
        }

        // تحميل السؤال
        function loadQuestion() {
            answered = false;
            document.getElementById('explanation-box').style.display = 'none';
            document.getElementById('next-btn').style.display = 'none';
            document.getElementById('quiz-card-box').classList.remove('shake-anim'); 
            
            const q = quizQuestions[currentIndex];
            document.getElementById('q-text').innerText = q.q;
            document.getElementById('progress-display').innerText = `📝 سؤال ${currentIndex + 1} من ${quizQuestions.length}`;
            document.getElementById('score-display').innerText = `⭐ النقاط: ${score}`;

            const optionsBox = document.getElementById('options-box');
            optionsBox.innerHTML = '';
            q.o.forEach((opt, index) => {
                const btn = document.createElement('button');
                btn.className = 'option-btn';
                btn.innerText = opt;
                btn.onclick = () => checkAnswer(index, btn);
                optionsBox.appendChild(btn);
            });
        }

        // التحقق من الإجابة
        function checkAnswer(selectedIndex, btnElement) {
            if (answered) return;
            answered = true;
            initAudio(); // لضمان عمل الصوت حتى بعد الريفرش

            const q = quizQuestions[currentIndex];
            const allBtns = document.getElementById('options-box').querySelectorAll('.option-btn');
            let messageHTML = '';

            if (selectedIndex === q.c) {
                btnElement.classList.add('correct');
                score++;
                playSound('correct');
                triggerVibration('correct');
                let randomMotiv = motivations[Math.floor(Math.random() * motivations.length)];
                messageHTML = `<span class="motivational-msg">${randomMotiv}</span>`;
            } else {
                btnElement.classList.add('incorrect');
                allBtns[q.c].classList.add('correct'); 
                playSound('wrong');
                triggerVibration('wrong');
                document.getElementById('quiz-card-box').classList.add('shake-anim');
            }

            document.getElementById('score-display').innerText = `⭐ النقاط: ${score}`;
            const expBox = document.getElementById('explanation-box');
            expBox.innerHTML = `${messageHTML} <strong>💡 الشرح:</strong> ${q.e}`;
            expBox.style.display = 'block';

            allBtns.forEach(b => b.style.pointerEvents = 'none');
            document.getElementById('next-btn').style.display = 'block';
        }

        // السؤال التالي
        function nextQuestion() {
            currentIndex++;
            saveState(); // الحفظ يتم فقط عند الانتقال للسؤال التالي لمنع الغش بالريفرش
            if (currentIndex < quizQuestions.length) {
                loadQuestion();
            } else {
                showFinalResult();
            }
        }

        // إنهاء مبكر
        function endQuizEarly() {
            if(confirm("هل أنت متأكد أنك تريد إنهاء الاختبار الآن وظهور النتيجة؟")) {
                showFinalResult();
            }
        }

        // إعادة الاختبار بكلمة مرور
        function requestRestart() {
            let pass = prompt("أدخل كلمة المرور لإعادة الاختبار وتصفير النتيجة:");
            if (pass === "151089") {
                localStorage.removeItem('SuperQuizState');
                location.reload();
            } else if (pass !== null) {
                alert("كلمة المرور خاطئة! لن يتم إعادة الاختبار.");
            }
        }

        // عرض النتيجة النهائية
        function showFinalResult() {
            clearInterval(timerInterval);
            let finalTime = formatTime(elapsedSeconds);
            let percentage = Math.round((score / quizQuestions.length) * 100);
            
            // تم الوصول للنهاية، نقوم بوضع الفهرس في النهاية في الحفظ
            currentIndex = quizQuestions.length;
            saveState();

            document.getElementById('quiz-card-box').innerHTML = `
                <h2 style="font-size:2rem; color:#4f46e5; margin-bottom:10px;">🎉 التقرير النهائي</h2>
                <h3 style="font-size:1.5rem; color:#333; margin-bottom:10px;">الاسم: ${userName}</h3>
                <p style="font-size:1.2rem; color:#64748b;">الوقت المستغرق: ${finalTime}</p>
                
                <div style="background:#f8fafc; padding:20px; border-radius:15px; margin:20px 0; border:2px dashed #cbd5e1;">
                    <p style="font-size:1.3rem; font-weight:bold; color:#334155;">الإجابات الصحيحة</p>
                    <h1 style="font-size:3rem; color:#10b981; margin:10px 0;">${score} <span style="font-size:1.5rem; color:#94a3b8;">من ${quizQuestions.length}</span></h1>
                    <h2 style="font-size:2.2rem; color:#f59e0b; margin-top:10px;">النسبة: %${percentage}</h2>
                </div>
                
                <button class="next-btn" style="display:block; background:#ef4444;" onclick="requestRestart()">إعادة الاختبار من البداية 🔄</button>
            `;
        }
    </script>
</body>
</html>
