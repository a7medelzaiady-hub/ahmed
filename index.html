<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>بوابة العباقرة - تعلم الإنجليزية</title>
    <!-- تضمين خط كايرو الاحترافي -->
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;800;900&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Cairo', sans-serif;
            /* خلفية متدرجة عصرية تناسب المنصات التعليمية */
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
            color: #fff;
            overflow-x: hidden;
        }

        .container {
            max-width: 800px;
            width: 100%;
            text-align: center;
            animation: fadeIn 1s ease-out;
        }

        .header-text {
            margin-bottom: 40px;
        }

        .header-text h1 {
            font-size: 3rem;
            font-weight: 900;
            margin-bottom: 15px;
            text-shadow: 0 4px 15px rgba(0,0,0,0.2);
            line-height: 1.2;
        }

        .header-text h1 span {
            color: #ffd700; /* لون ذهبي للتميز */
        }

        .header-text p {
            font-size: 1.2rem;
            font-weight: 400;
            opacity: 0.9;
            line-height: 1.6;
            max-width: 600px;
            margin: 0 auto;
        }

        /* تنسيق الأوسمة (المميزات) */
        .features {
            display: flex;
            justify-content: center;
            flex-wrap: wrap;
            gap: 15px;
            margin-bottom: 40px;
        }

        .badge {
            background: rgba(255, 255, 255, 0.2);
            backdrop-filter: blur(10px);
            padding: 8px 20px;
            border-radius: 50px;
            font-size: 1rem;
            font-weight: 600;
            border: 1px solid rgba(255, 255, 255, 0.3);
            display: flex;
            align-items: center;
            gap: 8px;
        }

        /* كارت الدخول التفاعلي 3D */
        .card {
            background: #ffffff;
            color: #333;
            padding: 40px 30px;
            border-radius: 30px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.3), 0 10px 20px rgba(0,0,0,0.2);
            cursor: pointer;
            text-align: center;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            max-width: 450px;
            margin: 0 auto;
            position: relative;
            transform-style: preserve-3d;
            border: 4px solid transparent;
        }

        .card:hover {
            transform: translateY(-15px) scale(1.03);
            box-shadow: 0 30px 60px rgba(0,0,0,0.4);
            border-color: #ffd700;
        }

        .card:active {
            transform: translateY(5px);
            box-shadow: 0 10px 20px rgba(0,0,0,0.2);
        }

        .card-icon {
            font-size: 4rem;
            margin-bottom: 15px;
            display: inline-block;
            animation: float 3s ease-in-out infinite;
        }

        .card h2 {
            font-size: 2rem;
            color: #4f46e5;
            margin-bottom: 10px;
            font-weight: 800;
        }

        .card p {
            color: #64748b;
            font-size: 1.1rem;
            font-weight: 600;
        }

        .start-btn {
            margin-top: 25px;
            display: inline-block;
            background: linear-gradient(135deg, #4f46e5 0%, #7c3aed 100%);
            color: white;
            padding: 12px 35px;
            border-radius: 50px;
            font-size: 1.2rem;
            font-weight: 700;
            box-shadow: 0 10px 20px rgba(79, 70, 229, 0.3);
            transition: 0.3s;
        }

        .card:hover .start-btn {
            background: linear-gradient(135deg, #7c3aed 0%, #4f46e5 100%);
            box-shadow: 0 15px 25px rgba(79, 70, 229, 0.5);
            transform: scale(1.05);
        }

        /* حركات الأنيميشن */
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-15px); }
        }

        /* استجابة الشاشات الصغيرة (الموبايل) */
        @media (max-width: 600px) {
            .header-text h1 { font-size: 2.2rem; }
            .header-text p { font-size: 1rem; }
            .card { padding: 30px 20px; }
            .card h2 { font-size: 1.6rem; }
            .card-icon { font-size: 3rem; }
            .badge { font-size: 0.9rem; padding: 6px 15px; }
        }
    </style>
</head>
<body>

    <div class="container">
        <!-- الترحيب والتحفيز -->
        <div class="header-text">
            <h1>مرحباً بك يا بطل في <span>التحدي الأكبر</span>!</h1>
            <p>أنت الآن على بُعد خطوة واحدة من اختبار مهاراتك في قواعد اللغة الإنجليزية والانتقال من مستوى الصفر إلى الاحتراف.</p>
        </div>

        <!-- مميزات الاختبار لجذب انتباه الطالب -->
        <div class="features">
            <span class="badge">🔥 200 سؤال مختلط</span>
            <span class="badge">🔊 تفاعل صوتي ذكي</span>
            <span class="badge">📳 اهتزاز عند الإجابة</span>
        </div>

        <!-- الكارت التفاعلي للذهاب لصفحة الاختبار -->
        <div class="card" onclick="window.location.href='grammar_quiz.html'">
            <div class="card-icon">🚀</div>
            <h2>جاهز للتحدي؟</h2>
            <p>اضغط هنا لفتح قاعة الاختبار وابدأ رحلتك الآن!</p>
            <div class="start-btn">دخول الاختبار ➔</div>
        </div>
    </div>

</body>
</html>
