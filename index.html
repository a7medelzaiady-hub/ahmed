<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>الصفحة الرئيسية</title>
    <style>
        body { 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            height: 100vh; 
            margin: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            background: #f0f2f5; 
        }
        .card { 
            background: white; 
            padding: 50px; 
            border-radius: 25px; 
            box-shadow: 0 10px 25px rgba(0,0,0,0.1); 
            cursor: pointer; 
            text-align: center; 
            transition: transform 0.3s ease, box-shadow 0.3s ease;
            border: 2px solid #4f46e5;
        }
        .card:hover { 
            transform: translateY(-10px); 
            box-shadow: 0 20px 35px rgba(0,0,0,0.15);
        }
        h1 { color: #333; margin-top: 0; }
        p { color: #666; }
    </style>
</head>
<body>

    <!-- الكارت الذي عند الضغط عليه يفتح ملف الاختبار -->
    <div class="card" onclick="window.location.href='Grammar_quiz.html'">
        <h1>الموقع شغال 👌</h1>
        <p>اضغط هنا لفتح اختبار القواعد (100 سؤال)</p>
    </div>

</body>
</html>
