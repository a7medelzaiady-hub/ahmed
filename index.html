<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>منصة تعلم الإنجليزية</title>
    <!-- تضمين تنسيقات الاختبار التي صممناها سابقاً -->
    <style>
        /* تنسيقات الصفحة الرئيسية */
        .home-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
            font-family: 'Cairo', sans-serif;
        }

        .card {
            background: white;
            padding: 40px;
            border-radius: 25px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.1);
            text-align: center;
            cursor: pointer;
            transition: transform 0.3s ease;
            border: 2px solid #4f46e5;
        }

        .card:hover {
            transform: scale(1.05);
        }

        .card h2 { color: #4f46e5; margin-bottom: 10px; }

        /* إخفاء صفحة الاختبار افتراضياً */
        #quiz-page { display: none; }
    </style>
</head>
<body>

    <!-- الصفحة الرئيسية -->
    <div id="home-page" class="home-container">
        <h1 style="color:black;">مرحباً بك في موقعي التعليمي 👌</h1>
        <p>اضغط على الكارت أدناه لبدء اختبار القواعد:</p>
        
        <div class="card" onclick="openQuiz()">
            <h2>ابدأ الاختبار التفاعلي</h2>
            <p>100 سؤال: Pronouns, Countable/Uncountable, Articles</p>
        </div>
    </div>

    <!-- صفحة الاختبار (تم إخفاؤها) -->
    <div id="quiz-page">
        <!-- هنا سيتم وضع كود صفحة الاختبار بالكامل التي أرسلتها لك في الرد السابق -->
        <!-- لضمان عمل الكود، يفضل وضع محتوى صفحة الاختبار هنا -->
    </div>

    <script>
        function openQuiz() {
            // إخفاء الصفحة الرئيسية
            document.getElementById('home-page').style.display = 'none';
            // إظهار صفحة الاختبار
            document.getElementById('quiz-page').style.display = 'block';
            
            // تحميل كود الاختبار إذا لم يكن موجوداً
            if(document.getElementById('quiz-page').innerHTML.trim() === "") {
                // يمكنك هنا استدعاء كود صفحة الاختبار الذي صممناه
                // أو وضع الكود كاملاً داخل هذا الـ div
            }
        }
    </script>
</body>
</html>
