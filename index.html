<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<title>برنامج مبيعات</title>

<style>
body { font-family: Arial; text-align: center; }
input, button { padding:10px; margin:5px; width:80%; }
</style>

</head>

<body>

<h2>برنامج مبيعات</h2>

<input id="product" placeholder="اسم المنتج"><br>
<input id="price" placeholder="السعر"><br>
<input id="qty" placeholder="الكمية"><br>

<button onclick="addProduct()">إضافة</button>

<h3 id="total">الإجمالي: 0</h3>

<ul id="list"></ul>

<script>

let products = JSON.parse(localStorage.getItem("products")) || [];

function save(){
  localStorage.setItem("products", JSON.stringify(products));
}

function addProduct(){
  let name = document.getElementById("product").value;
  let price = document.getElementById("price").value;
  let qty = document.getElementById("qty").value;

  let total = price * qty;

  products.push({name, price, qty, total});
  save();
  show();
}

function show(){
  let list = document.getElementById("list");
  list.innerHTML = "";

  products.forEach(p => {
    let li = document.createElement("li");
    li.innerText = p.name + " = " + p.total;
    list.appendChild(li);
  });
}

show();

</script>

</body>
</html>
