<html lang="ar" dir="rtl">

        .stat-item {

        .end-btn { background: #fef3c7; color: #d97706; }
        .restart-btn { background: #fee2e2; color: #ef4444; }

        .question-text { font-size: 1.5rem; font-weight: 900; margin-bottom: 20px; direction: ltr; color: #0f172a; }
        
        .options-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        
        .option-btn {

        @keyframes fadeIn { from { opacity: 0; transform: translateY(15px); } to { opacity: 1; transform: translateY(0); } }

        @keyframes shake {

            20%, 60% { transform: translateX(-10px); }
            40%, 80% { transform: translateX(10px); }
        }

        function initAudio() {
            if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        }

        function playSound(type) {
            if (!audioCtx) return;
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.connect(gain); gain.connect(audioCtx.destination);
            if (type === 'correct') {
                osc.type = 'sine'; osc.frequency.setValueAtTime(800, audioCtx.currentTime);
                osc.frequency.exponentialRampToValueAtTime(1200, audioCtx.currentTime + 0.1);
                gain.gain.setValueAtTime(1, audioCtx.currentTime);
                gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.3);
                osc.start(); osc.stop(audioCtx.currentTime + 0.3);
            } else {
                osc.type = 'sawtooth'; osc.frequency.setValueAtTime(150, audioCtx.currentTime);
                osc.frequency.exponentialRampToValueAtTime(80, audioCtx.currentTime + 0.3);
                gain.gain.setValueAtTime(1, audioCtx.currentTime);
                gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.4);
                osc.start(); osc.stop(audioCtx.currentTime + 0.4);
            }
        }

        function triggerVibration(type) {
            if (!navigator.vibrate) return;
            if (type === 'correct') navigator.vibrate([100]);
            else navigator.vibrate([200, 100, 200]);
        }

        function startTimer() {
            clearInterval(timerInterval);
            timerInterval = setInterval(() => {
                elapsedSeconds++;
                let m = Math.floor(elapsedSeconds / 60).toString().padStart(2, '0');
                let s = (elapsedSeconds % 60).toString().padStart(2, '0');
                document.getElementById('timer-display').innerText = `⏱️ ${m}:${s}`;
                saveState();
            }, 1000);
        }

        // ترتيب عشوائي للاسئلة الـ 100 في كل مرة
        function generateQuestions() {
            return [...rawQuestions].sort(() => Math.random() - 0.5);
        }

        function saveState() {
            const state = { userName, quizQuestions, currentIndex, score, elapsedSeconds };
            localStorage.setItem('GrammarHeroesState100', JSON.stringify(state));
        }

        function loadState() {
            const saved = localStorage.getItem('GrammarHeroesState100');
            if (saved) {
                const state = JSON.parse(saved);
                userName = state.userName;
                quizQuestions = state.quizQuestions;
                currentIndex = state.currentIndex;
                score = state.score;
                elapsedSeconds = state.elapsedSeconds || 0;
                return true;
            }
            return false;
        }

        window.onload = () => {
            if (loadState() && currentIndex < quizQuestions.length) {
                document.getElementById('landing-page').style.display = 'none';
                document.getElementById('quiz-page').style.display = 'block';
                document.body.style.background = '#eef2f6';
                startTimer();
                loadQuestion();
            }
        };

        function startAwesomeQuiz() {
            const nameInput = document.getElementById('user-name').value.trim();
            if(nameInput === "") {
                alert("اكتب اسمك الأول يا بطل عشان نبدأ!");
                return;
            }
            userName = nameInput;
            quizQuestions = generateQuestions();
            currentIndex = 0;
            score = 0;
            elapsedSeconds = 0;
            
            initAudio(); 
            saveState();

            document.getElementById('landing-page').style.display = 'none'; 
            document.getElementById('quiz-page').style.display = 'block'; 
            document.body.style.background = '#eef2f6'; 
            
            startTimer();
            loadQuestion();
        }

        function loadQuestion() {
            answered = false;
            document.getElementById('explanation-box').style.display = 'none';
            document.getElementById('next-btn').style.display = 'none';
            document.getElementById('quiz-card-box').classList.remove('shake-anim'); 
            
            const q = quizQuestions[currentIndex];
            document.getElementById('q-text').innerText = q.q;
            document.getElementById('progress-display').innerText = `📝 سؤال ${currentIndex + 1} من ${quizQuestions.length}`;
            document.getElementById('score-display').innerText = `⭐ النجمة: ${score}`;

            const optionsBox = document.getElementById('options-box');
            optionsBox.innerHTML = '';
            q.o.forEach((opt, index) => {
                const btn = document.createElement('button');
                btn.className = 'option-btn';
                btn.innerText = opt;
                btn.onclick = () => checkAnswer(index, btn);
                optionsBox.appendChild(btn);
            });
        }

        function checkAnswer(selectedIndex, btnElement) {
            if (answered) return;
            answered = true;
            initAudio();

            const q = quizQuestions[currentIndex];
            const allBtns = document.getElementById('options-box').querySelectorAll('.option-btn');
            let messageHTML = '';

            if (selectedIndex === q.c) {
                btnElement.classList.add('correct');
                score++;
                playSound('correct');
                triggerVibration('correct');
                let randomMotiv = motivations[Math.floor(Math.random() * motivations.length)];
                messageHTML = `<span class="motivational-msg">${randomMotiv}</span>`;
            } else {
                btnElement.classList.add('incorrect');
                allBtns[q.c].classList.add('correct'); 
                playSound('wrong');
                triggerVibration('wrong');
                document.getElementById('quiz-card-box').classList.add('shake-anim');
            }

            document.getElementById('score-display').innerText = `⭐ النجمة: ${score}`;
            const expBox = document.getElementById('explanation-box');
            expBox.innerHTML = `${messageHTML} <br> <strong>💡 الشرح:</strong> ${q.e}`;
            expBox.style.display = 'block';

            allBtns.forEach(b => b.style.pointerEvents = 'none');
            document.getElementById('next-btn').style.display = 'block';
        }

        function nextQuestion() {
            currentIndex++;
            saveState(); 
            if (currentIndex < quizQuestions.length) {
                loadQuestion();
            } else {
                showFinalResult();
            }
        }

        function endQuizEarly() {
            if(confirm("متأكد إنك عاوز تنهي التحدي دلوقتي وتشوف نتيجتك؟")) {
                showFinalResult();
            }
        }

        function requestRestart() {
            let pass = prompt("لإعادة التحدي من الأول، أدخل كلمة السر:");
            if (pass === "151089") {
                localStorage.removeItem('GrammarHeroesState100');
                location.reload();
            } else if (pass !== null) {
                alert("كلمة السر غلط! حاول تاني.");
            }
        }

        function showFinalResult() {
            clearInterval(timerInterval);
            let finalTime = formatTime(elapsedSeconds);
            let percentage = Math.round((score / quizQuestions.length) * 100);
            
            currentIndex = quizQuestions.length;
            saveState();

            document.getElementById('quiz-card-box').innerHTML = `
                <h2 style="font-size:2.2rem; color:#3b82f6; margin-bottom:10px;">🎉 التقرير النهائي للعبقري</h2>
                <h3 style="font-size:1.8rem; color:#1e293b; margin-bottom:10px;">البطل: ${userName}</h3>
                <p style="font-size:1.2rem; color:#64748b;">الوقت المستغرق: ${finalTime}</p>
                
                <div style="background:#f8fafc; padding:20px; border-radius:15px; margin:20px 0; border:3px dashed #cbd5e1;">
                    <p style="font-size:1.4rem; font-weight:900; color:#334155;">الإجابات الصحيحة</p>
                    <h1 style="font-size:3.5rem; color:#10b981; margin:10px 0;">${score} <span style="font-size:1.5rem; color:#94a3b8;">من ${quizQuestions.length}</span></h1>
                    <h2 style="font-size:2.2rem; color:#f59e0b; margin-top:10px;">النسبة: %${percentage}</h2>
                </div>
                
                <button class="next-btn" style="display:block; background:#ef4444;" onclick="requestRestart()">إعادة التحدي (ل للمدرسين) 🔄</button>
            `;
        }
    </script>
