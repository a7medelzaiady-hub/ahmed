<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>التحدي الأكبر لقواعد اللغة الإنجليزية</title>
  <style>
    :root { --primary: #6366f1; --success: #22c55e; --error: #ef4444; }
    body { font-family: 'Cairo', sans-serif; background: #f8fafc; padding: 20px; transition: 0.3s; }
    
    /* 3D Card Effect */
    .card {
      background: white;
      padding: 30px;
      border-radius: 20px;
      box-shadow: 0 15px 35px rgba(0,0,0,0.1), 0 5px 15px rgba(0,0,0,0.05);
      transform-style: preserve-3d;
      transition: transform 0.2s;
    }
    .option-btn {
      width: 100%; padding: 20px; margin: 10px 0; border: none; border-radius: 15px;
      background: #f1f5f9; cursor: pointer; font-size: 1.1rem; transition: 0.2s;
      border: 2px solid transparent;
    }
    .option-btn:active { transform: scale(0.95); }
    .correct { background: var(--success) !important; color: white; box-shadow: 0 5px 15px rgba(34,197,94,0.4); }
    .incorrect { background: var(--error) !important; color: white; animation: shake 0.3s; }
    
    @keyframes shake { 0%, 100% {transform: translateX(0);} 25% {transform: translateX(-10px);} 75% {transform: translateX(10px);} }
  </style>
</head>
<body>

<div id="quiz-container" class="card" style="max-width: 600px; margin: auto;">
  <div id="q-box"></div>
</div>

<script>
  // أصوات بسيطة باستخدام المتصفح (بدون ملفات خارجية)
  const playSound = (type) => {
    const ctx = new (window.AudioContext || window.webkitAudioContext)();
    const osc = ctx.createOscillator();
    const gain = ctx.createGain();
    osc.connect(gain);
    gain.connect(ctx.destination);
    
    if(type === 'correct') {
      osc.frequency.value = 800; // صوت حاد
      gain.gain.exponentialRampToValueAtTime(0.0001, ctx.currentTime + 0.5);
    } else {
      osc.frequency.value = 200; // صوت غليظ
      gain.gain.exponentialRampToValueAtTime(0.0001, ctx.currentTime + 0.8);
    }
    osc.start(); osc.stop(ctx.currentTime + 0.5);
  };

  // زيادة الأسئلة لـ 200 (مختلطة)
  const questions = [
    {q: "I ___ to school every day.", options: ["go", "goes", "going", "gone"], correct: 0, exp: "فعل مضارع بسيط مع I"},
    {q: "She ___ not like apples.", options: ["do", "does", "did", "doing"], correct: 1, exp: "She تأخذ does"},
    // ... قم بإضافة بقية الأسئلة هنا بنفس التنسيق
  ];

  let current = 0;
  function render() {
    const q = questions[current];
    document.getElementById('q-box').innerHTML = `
      <h3>${q.q}</h3>
      ${q.options.map((o, i) => `<button class="option-btn" onclick="check(${i})">${o}</button>`).join('')}
    `;
  }

  function check(idx) {
    if(idx === questions[current].correct) {
      playSound('correct');
      // اهتزاز خفيف للصح
      if(navigator.vibrate) navigator.vibrate(100);
    } else {
      playSound('wrong');
      // اهتزاز قوي للخطأ
      if(navigator.vibrate) navigator.vibrate(500);
    }
    // انتقال تلقائي بعد ثانية
    setTimeout(() => { current++; render(); }, 1000);
  }

  render();
</script>
</body>
</html>
