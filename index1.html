<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تطبيق حفظ وتفسير سورة المجادلة للأطفال - الشيخ هيثم الدخين</title>
    <style>
        :root {
            --primary: #0d9488;
            --primary-hover: #0f766e;
            --bg: #0f172a;
            --card-bg: #1e293b;
            --text: #f8fafc;
            --text-sub: #94a3b8;
            --accent: #f59e0b;
            --active-border: #38bdf8;
            --tafsir-bg: rgba(6, 78, 59, 0.4);
            --tafsir-text: #a7f3d0;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: system-ui, -apple-system, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg);
            color: var(--text);
            padding: 15px;
            direction: rtl;
            line-height: 1.6;
        }

        .container {
            max-width: 650px;
            margin: 0 auto;
        }

        header {
            text-align: center;
            margin-bottom: 20px;
            padding: 15px;
            background: var(--card-bg);
            border-radius: 12px;
            border-top: 4px solid var(--primary);
        }

        h1 {
            font-size: 1.4rem;
            color: #5eead4;
            margin-bottom: 5px;
        }

        p.subtitle {
            font-size: 0.9rem;
            color: var(--text-sub);
        }

        .media-card {
            background: var(--card-bg);
            padding: 18px;
            border-radius: 12px;
            margin-bottom: 20px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.3);
            position: sticky;
            top: 10px;
            z-index: 100;
        }

        .file-input-group {
            margin-bottom: 12px;
        }

        .file-input-group label {
            display: block;
            font-size: 0.85rem;
            color: var(--text-sub);
            margin-bottom: 6px;
        }

        input[type="file"] {
            width: 100%;
            padding: 8px;
            border-radius: 8px;
            background: #0f172a;
            color: var(--text);
            border: 1px solid #334155;
            font-size: 0.85rem;
        }

        audio {
            width: 100%;
            margin-top: 10px;
            border-radius: 8px;
        }

        .controls {
            display: flex;
            gap: 10px;
            margin-top: 12px;
            flex-wrap: wrap;
        }

        .btn {
            background: var(--primary);
            color: white;
            border: none;
            padding: 10px 14px;
            border-radius: 8px;
            font-weight: bold;
            cursor: pointer;
            flex: 1;
            min-width: 120px;
            font-size: 0.9rem;
            transition: all 0.2s;
            text-align: center;
        }

        .btn:hover {
            background: var(--primary-hover);
        }

        .btn-loop {
            background: #334155;
            color: var(--text);
        }

        .btn-loop.active {
            background: var(--accent);
            color: #000;
        }

        .verse-card {
            background: var(--card-bg);
            border-right: 4px solid var(--primary);
            padding: 16px;
            border-radius: 10px;
            margin-bottom: 16px;
            transition: border-color 0.2s;
        }

        .verse-card.playing {
            border-right-color: var(--active-border);
            background: #1e293b;
            box-shadow: 0 0 0 2px var(--active-border);
        }

        .verse-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 10px;
        }

        .verse-num {
            background: var(--primary);
            color: white;
            padding: 3px 10px;
            border-radius: 20px;
            font-size: 0.85rem;
            font-weight: bold;
        }

        .verse-text {
            font-size: 1.25rem;
            line-height: 2.2;
            color: #f1f5f9;
            text-align: justify;
        }

        .tafsir-box {
            background: var(--tafsir-bg);
            border: 1px solid #10b981;
            padding: 12px;
            border-radius: 8px;
            margin-top: 12px;
            font-size: 0.95rem;
            color: var(--tafsir-text);
            line-height: 1.7;
        }

        .tafsir-title {
            font-weight: bold;
            color: #34d399;
            margin-bottom: 4px;
            display: flex;
            align-items: center;
            gap: 5px;
        }

        .play-btn {
            background: #334155;
            color: #5eead4;
            border: 1px solid var(--primary);
            padding: 6px 14px;
            border-radius: 6px;
            font-size: 0.85rem;
            cursor: pointer;
            font-weight: bold;
        }

        .play-btn:hover {
            background: var(--primary);
            color: white;
        }

        .time-inputs {
            display: flex;
            gap: 10px;
            margin-top: 10px;
            font-size: 0.8rem;
            color: var(--text-sub);
            align-items: center;
        }

        .time-inputs input {
            width: 60px;
            padding: 4px;
            background: #0f172a;
            border: 1px solid #334155;
            color: var(--text);
            border-radius: 4px;
            text-align: center;
        }
    </style>
</head>
<body>

<div class="container">
    <header>
        <h1>📖 حفظ وتفسير سورة المجادلة كاملاً</h1>
        <p class="subtitle">بصوت الشيخ هيثم الدخين - مع تفسير مبسط بالمصري للأبطال الصغار</p>
    </header>

    <div class="media-card">
        <div class="file-input-group">
            <label>اختر ملف الصوت من جهازك (ملف MP3 للسورة):</label>
            <input type="file" id="audioFileInput" accept="audio/*">
        </div>

        <audio id="audioPlayer" controls>
            <source id="audioSource" src="audio.mp3" type="audio/mpeg">
            متصفحك لا يدعم مشغل الصوت.
        </audio>
        
        <div class="controls">
            <button class="btn btn-loop" id="loopBtn" onclick="toggleLoop()">🔄 تكرار الآية: إيقاف</button>
            <button class="btn" onclick="stopAudio()">⏹️ إيقاف مؤقت</button>
        </div>
    </div>

    <!-- قائمة آيات السورة والتفسير -->
    <div id="versesList"></div>
</div>

<script>
    // سورة المجادلة كاملة (22 آية) مقسمة بالأوقات المباشرة من التسجيل الصوتي المرفق

        {

            tafsir: "زمان كان بعض الرجال يقولوا لزوجاتهم: انتي محرمة عليا زي أمي، وده كلام غلط وكذب زعل ربنا. ربنا بيعلمنا نحترم أسرنا وما نقولش كلام يزعل أو يجرح حد من غير حق.",

    const player = document.getElementById('audioPlayer');
    const audioFileInput = document.getElementById('audioFileInput');
    let currentVerse = null;
    let isLooping = false;

    // تحميل ملف صوت محلي عند الاختيار
    audioFileInput.addEventListener('change', function(e) {
        const file = e.target.files[0];
        if (file) {
            const url = URL.createObjectURL(file);
            player.src = url;
            player.play();
        }
    });

    // بناء واجهة الآيات والتفسير
    const listContainer = document.getElementById('versesList');
    verses.forEach(v => {
        const card = document.createElement('div');
        card.className = 'verse-card';
        card.id = `verse-card-${v.num}`;
        card.innerHTML = `
            <div class="verse-header">
                <span class="verse-num">الآية ${v.num}</span>
                <button class="play-btn" onclick="playVerse(${v.num})">▶ تشغيل</button>
            </div>
            <div class="verse-text">${v.text}</div>
            
            <div class="tafsir-box">
                <div class="tafsir-title">💡 التفسير بالمصري للأبطال:</div>
                ${v.tafsir}
            </div>

            <div class="time-inputs">
                <label>البداية (ثانية):</label>
                <input type="number" id="start-${v.num}" value="${v.start}" onchange="updateTime(${v.num})">
                <label>النهاية (ثانية):</label>
                <input type="number" id="end-${v.num}" value="${v.end}" onchange="updateTime(${v.num})">
            </div>
        `;
        listContainer.appendChild(card);
    });

    function updateTime(num) {
        const v = verses.find(item => item.num === num);
        if (v) {
            v.start = parseFloat(document.getElementById(`start-${num}`).value) || 0;
            v.end = parseFloat(document.getElementById(`end-${num}`).value) || 0;
        }
    }

    function playVerse(num) {
        // إزالة التظليل عن السابق
        document.querySelectorAll('.verse-card').forEach(c => c.classList.remove('playing'));
        
        currentVerse = verses.find(v => v.num === num);
        if (!currentVerse) return;

        document.getElementById(`verse-card-${num}`).classList.add('playing');
        
        player.currentTime = currentVerse.start;
        player.play();
    }

    function stopAudio() {
        player.pause();
    }

    function toggleLoop() {
        isLooping = !isLooping;
        const btn = document.getElementById('loopBtn');
        if (isLooping) {
            btn.classList.add('active');
            btn.innerText = '🔄 تكرار الآية: مفعل';
        } else {
            btn.classList.remove('active');
            btn.innerText = '🔄 تكرار الآية: إيقاف';
        }
    }

    // متابعة زمن التشغيل للتكرار والتنقل
    player.addEventListener('timeupdate', () => {
        if (currentVerse) {
            if (player.currentTime >= currentVerse.end) {
                if (isLooping) {
                    player.currentTime = currentVerse.start;
                    player.play();
                } else {
                    player.pause();
                }
            }
        }
    });
</script>
