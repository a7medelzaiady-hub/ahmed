<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تطبيق حفظ وتفسير سورة المجادلة للأطفال (1-11) - الشيخ هيثم الدخين</title>
    <style>
        :root {
            --primary: #0d9488;
            --primary-hover: #0f766e;
            --bg: #0f172a;
            --card-bg: #1e293b;
            --text: #f8fafc;
            --text-sub: #94a3b8;
            --accent: #f59e0b;
            --active-border: #38bdf8;
            --tafsir-bg: #064e3b;
            --tafsir-text: #a7f3d0;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: system-ui, -apple-system, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg);
            color: var(--text);
            padding: 15px;
            direction: rtl;
            line-height: 1.6;
        }

        .container {
            max-width: 600px;
            margin: 0 auto;
        }

        header {
            text-align: center;
            margin-bottom: 20px;
            padding: 15px;
            background: var(--card-bg);
            border-radius: 12px;
            border-top: 4px solid var(--primary);
        }

        h1 {
            font-size: 1.4rem;
            color: #5eead4;
            margin-bottom: 5px;
        }

        p.subtitle {
            font-size: 0.9rem;
            color: var(--text-sub);
        }

        .media-card {
            background: var(--card-bg);
            padding: 18px;
            border-radius: 12px;
            margin-bottom: 20px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.3);
        }

        .file-input-group {
            margin-bottom: 12px;
        }

        .file-input-group label {
            display: block;
            font-size: 0.85rem;
            color: var(--text-sub);
            margin-bottom: 6px;
        }

        input[type="file"] {
            width: 100%;
            padding: 8px;
            border-radius: 8px;
            background: #0f172a;
            color: var(--text);
            border: 1px solid #334155;
            font-size: 0.85rem;
        }

        audio {
            width: 100%;
            margin-top: 10px;
            border-radius: 8px;
        }

        .controls {
            display: flex;
            gap: 10px;
            margin-top: 12px;
            flex-wrap: wrap;
        }

        .btn {
            background: var(--primary);
            color: white;
            border: none;
            padding: 10px 14px;
            border-radius: 8px;
            font-weight: bold;
            cursor: pointer;
            flex: 1;
            min-width: 120px;
            font-size: 0.9rem;
            transition: all 0.2s;
            text-align: center;
        }

        .btn:hover {
            background: var(--primary-hover);
        }

        .btn-loop {
            background: #334155;
            color: var(--text);
        }

        .btn-loop.active {
            background: var(--accent);
            color: #000;
        }

        .verse-card {
            background: var(--card-bg);
            border-right: 4px solid var(--primary);
            padding: 16px;
            border-radius: 10px;
            margin-bottom: 16px;
            transition: border-color 0.2s;
        }

        .verse-card.playing {
            border-right-color: var(--active-border);
            background: #1e293b;
            box-shadow: 0 0 0 2px var(--active-border);
        }

        .verse-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 10px;
        }

        .verse-num {
            background: var(--primary);
            color: white;
            padding: 3px 10px;
            border-radius: 20px;
            font-size: 0.85rem;
            font-weight: bold;
        }

        .verse-text {
            font-size: 1.2rem;
            line-height: 2.2;
            color: #f1f5f9;
            text-align: justify;
        }

        .tafsir-box {
            background: rgba(6, 78, 59, 0.4);
            border: 1px solid #10b981;
            padding: 12px;
            border-radius: 8px;
            margin-top: 12px;
            font-size: 0.95rem;
            color: var(--tafsir-text);
            line-height: 1.7;
        }

        .tafsir-title {
            font-weight: bold;
            color: #34d399;
            margin-bottom: 4px;
            display: flex;
            align-items: center;
            gap: 5px;
        }

        .play-btn {
            background: #334155;
            color: #5eead4;
            border: 1px solid var(--primary);
            padding: 6px 14px;
            border-radius: 6px;
            font-size: 0.85rem;
            cursor: pointer;
            font-weight: bold;
        }

        .play-btn:hover {
            background: var(--primary);
            color: white;
        }

        .time-inputs {
            display: flex;
            gap: 10px;
            margin-top: 10px;
            font-size: 0.8rem;
            color: var(--text-sub);
            align-items: center;
        }

        .time-inputs input {
            width: 60px;
            padding: 4px;
            background: #0f172a;
            border: 1px solid #334155;
            color: var(--text);
            border-radius: 4px;
            text-align: center;
        }
    </style>
</head>
<body>

<div class="container">
    <header>
        <h1>📖 حفظ وتفسير سورة المجادلة (1 - 11)</h1>
        <p class="subtitle">بصوت الشيخ هيثم الدخين - مع تفسير مبسط للأطفال</p>
    </header>

    <div class="media-card">
        <div class="file-input-group">
            <label>اختر ملف الصوت من جهازك (ملف MP3 للسورة):</label>
            <input type="file" id="audioFileInput" accept="audio/*">
        </div>

        <audio id="audioPlayer" controls>
            <source id="audioSource" src="audio.mp3" type="audio/mpeg">
            متصفحك لا يدعم مشغل الصوت.
        </audio>
        
        <div class="controls">
            <button class="btn btn-loop" id="loopBtn" onclick="toggleLoop()">🔄 تكرار الآية: إيقاف</button>
            <button class="btn" onclick="stopAudio()">⏹️ إيقاف مؤقت</button>
        </div>
    </div>

    <!-- قائمة الآيات والتفسير -->
    <div id="versesList"></div>
</div>

<script>
    // قائمة الآيات والتقسيم مع أوقات البداية والنهاية الدقيقة بحسب الملف الصوتي المرفق
    const verses = [
        { 
            num: 1, 
            text: "قَدْ سَمِعَ اللَّهُ قَوْلَ الَّتِي تُجَادِلُكَ فِي زَوْجِهَا وَتَشْتَكِي إِلَى اللَّهِ وَاللَّهُ يَسْمَعُ تَحَاوُرَكُمَا ۚ إِنَّ اللَّهَ سَمِيعٌ بَصِيرٌ", 
            tafsir: "ربنا سبحانه وتعالى يسمع كل شيء! جاءت امرأة صالحة للنبي ﷺ تشتكي من مشكلة مع زوجها، فالله سمِع صوتها ودعاءها من فوق سبع سماوات وفرّج عنها. ربنا قريب منا دائماً ويسمعنا عندما ندعوه.",
            start: 4, 
            end: 27 
        },
        { 
            num: 2, 
            text: "الَّذِينَ يُظَاهِرُونَ مِنكُم مِّن نِّسَائِهِم مَّا هُنَّ أُمَّهَاتِهِمْ ۖ إِنْ أُمَّهَاتُهُمْ إِلَّا اللَّائِي وَلَدْنَهُمْ ۚ وَإِنَّهُمْ لَيَقُولُونَ مُنكَرًا مِّنَ الْقَوْلِ وَزُورًا ۚ وَإِنَّ اللَّهَ لَعَفُوٌّ غَفُورٌ", 
            tafsir: "في القديم، كان بعض الرجال يقولون لزوجاتهم كلمات سيئة تزعلهنّ وتبطِل الزواج. ربنا قال إن هذا كلام خطأ وغير صحيح، وعلمنا أن نحترم أسرنا ونتكلم دائماً بكلام طيب ولا نؤذي أحداً بكلامنا.",
            start: 27, 
            end: 58 
        },
        { 
            num: 3, 
            text: "وَالَّذِينَ يُظَاهِرُونَ مِن نِّسَائِهِمْ ثُمَّ يَعُودُونَ لِمَا قَالُوا فَتَحْرِيرُ رَقَبَةٍ مِّن قَبْلِ أَن يَتَمَاسَّا ۚ ذَٰلِكُمْ تُوعَظُونَ بِهِ ۚ وَاللَّهُ بِمَا تَعْمَلُونَ خَبِيرٌ", 
            tafsir: "من يخطئ ويقول هذا الكلام السيئ، يجب عليه أن يعتذر ويكفر عن خطئه برقبة أو عمل صالح ليعود لزوجته، ليتعلم الجميع عدم التسرع في الكلام.",
            start: 58, 
            end: 87 
        },
        { 
            num: 4, 
            text: "فَمَن لَّمْ يَجِدْ فَصِيَامُ شَهْرَيْنِ مُتَتَابِعَيْنِ مِن قَبْلِ أَن يَتَمَاسَّا ۖ فَمَن لَّمْ يَسْتَطِعْ فَإِطْعَامُ سِتِّينَ مِسْكِينًا ۚ ذَٰلِكَ لِتُؤْمِنُوا بِاللَّهِ وَرَسُولِهِ ۚ وَتِلْكَ حُدُودُ اللَّهِ ۗ وَلِلْكَافِرِينَ عَذَابٌ أَلِيمٌ", 
            tafsir: "إذا لم يستطع، يصوم شهرين متتالين أو يطعم ستين مسكيناً، وهذا يعلمنا أن نعين المساكين ونحافظ على حدود الله وأوامره.",
            start: 87, 
            end: 120 
        },
        { 
            num: 5, 
            text: "إِنَّ الَّذِينَ يُحَادُّونَ اللَّهَ وَرَسُولَهُ كُبِتُوا كَمَا كُبِتَ الَّذِينَ مِن قَبْلِهِمْ ۚ وَقَدْ أَنزَلْنَا آيَاتٍ بَيِّنَاتٍ ۚ وَلِلْكَافِرِينَ عَذَابٌ مُّهِينٌ", 
            tafsir: "الأشخاص الذين يحاربون الله ورسوله ولا يطيعون الأوامر يخسرون في الدنيا والآخرة لأنهم يعصون الخالق.",
            start: 120, 
            end: 145 
        },
        { 
            num: 6, 
            text: "يَوْمَ يَبْعَثُهُمُ اللَّهُ جَمِيعًا فَيُنَبِّئُهُم بِمَا عَمِلُوا ۚ أَحْصَاهُ اللَّهُ وَنَسُوهُ ۚ وَاللَّهُ عَلَىٰ كُلِّ شَيْءٍ شَهِيدٌ", 
            tafsir: "في يوم القيامة، ربنا سيجمع كل الناس ويخبرهم بكل عمل عملوه، حتى لو نسوه، لأن الله لا ينسى أي شيء ويشاهد كل أعمالنا الصالحة ليكافئنا عليها!",
            start: 145, 
            end: 167 
        },
        { 
            num: 7, 
            text: "أَلَمْ تَرَ أَنَّ اللَّهَ يَعْلَمُ مَا فِي السَّمَاوَاتِ وَمَا فِي الْأَرْضِ ۖ مَا يَكُونُ مِن نَّجْوَىٰ ثَلَاثَةٍ إِلَّا هُوَ رَابِعُهُمْ وَلَا خَمْسَةٍ إِلَّا هُوَ سَادِسُهُمْ وَلَا أَدْنَىٰ مِن ذَٰلِكَ وَلَا أَكْثَرَ إِلَّا هُوَ مَعَهُمْ أَيْنَ مَا كَانُوا ۖ ثُمَّ يُنَبِّئُهُم بِمَا عَمِلُوا يَوْمَ الْقِيَامَةِ ۚ إِنَّ اللَّهَ بِكُلِّ شَيْءٍ عَلِيمٌ", 
            tafsir: "الله يعلم كل شيء! لو جلس ثلاثة يتهمسون سرّاً، فالله معهم بعلمه ويسمعهم. هذا يجعلنا نطمئن أن ربنا معنا دائماً، ويجعلنا نحرص ألا نقول إلا الكلام الصالح.",
            start: 167, 
            end: 211 
        },
        { 
            num: 8, 
            text: "أَلَمْ تَرَ إِلَى الَّذِينَ نُهُوا عَنِ النَّجْوَىٰ ثُمَّ يَعُودُونَ لِمَا نُهُوا عَنْهُ وَيَتَنَاجَوْنَ بِالْإِثْمِ وَالْعُدْوَانِ وَمَعْصِيَتِ الرَّسُولِ وَإِذَا جَاءُوكَ حَيَّوَكَ بِمَا لَمْ يُحَيِّكَ بِهِ اللَّهُ وَيَقُولُونَ فِي أَنفُسِهِمْ لَوْلَا يُعَذِّبُنَا اللَّهُ بِمَا نَقُولُ ۚ حَسْبُهُمْ جَهَنَّمُ يَصْلَوْنَهَا ۖ فَبِئْسَ الْمَصِيرُ", 
            tafsir: "كان هناك أناس غير طيبين يتجمعون ويتهمسون بكلام شر يؤذي المسلمين. ربنا يعلمنا ألا نتآمر أو نتحدث في الخفاء عن أي شخص بأشياء سيئة تؤذيه.",
            start: 211, 
            end: 252 
        },
        { 
            num: 9, 
            text: "يَا أَيُّهَا الَّذِينَ آمَنُوا إِذَا تَنَاجَيْتُمْ فَلَا تَتَنَاجَوْا بِالْإِثْمِ وَالْعُدْوَانِ وَمَعْصِيَتِ الرَّسُولِ وَتَنَاجَوْا بِالْبِرِّ وَالتَّقْوَىٰ ۖ وَاتَّقُوا اللَّهَ الَّذِي إِلَيْهِ تُحْشَرُونَ", 
            tafsir: "ينادينا الله: يا أيها الأبطال المؤمنون! إذا أردتم أن تتحدثوا فيما بينكم، اتهمسوا بالخير والمساعدة على طاعة الله وفعل الصالحات والبر.",
            start: 252, 
            end: 278 
        },
        { 
            num: 10, 
            text: "إِنَّمَا النَّجْوَىٰ مِنَ الشَّيْطَانِ لِيَحْزُنَ الَّذِينَ آمَنُوا وَلَيْسَ بِضَارِّهِمْ شَيْئًا إِلَّا بِإِذْنِ اللَّهِ ۚ وَعَلَى اللَّهِ فَلْيَتَوَكَّلِ الْمُؤْمِنُونَ", 
            tafsir: "الحديث السري الذي يثير الشكوك هو من وسوسة الشيطان ليحزن المؤمنين. لكن المؤمن الشجاع يتوكل على الله، لأن الشيطان لا يستطيع إيذاءنا طالما أن الله يحمينا!",
            start: 278, 
            end: 302 
        },
        { 
            num: 11, 
            text: "يَا أَيُّهَا الَّذِينَ آمَنُوا إِذَا قِيلَ لَكُمْ تَفَسَّحُوا فِي الْمَجَالِسِ فَافْسَحُوا يَفْسَحِ اللَّهُ لَكُمْ ۖ وَإِذَا قِيلَ انشُزُوا فَانشُزُوا يَرْفَعِ اللَّهُ الَّذِينَ آمَنُوا مِنكُمْ وَالَّذِينَ أُوتُوا الْعِلْمَ دَرَجَاتٍ ۚ وَاللَّهُ بِمَا تَعْمَلُونَ خَبِيرٌ", 
            tafsir: "أدب جميل من آداب الإسلام! إذا كنتم في مجلس أو فصل وجاء صديق لكم، أفسحوا له ووسعوا المكان. ربنا يفرح بهذا السلوك ويوسع عليكم، ويرفع درجات العلم والذكاء لمن يتعلم!",
            start: 302, 
            end: 334 
        }
    ];

    const player = document.getElementById('audioPlayer');
    const audioFileInput = document.getElementById('audioFileInput');
    let currentVerse = null;
    let isLooping = false;

    // تحميل ملف صوت محلي عند الاختيار
    audioFileInput.addEventListener('change', function(e) {
        const file = e.target.files[0];
        if (file) {
            const url = URL.createObjectURL(file);
            player.src = url;
            player.play();
        }
    });

    // بناء واجهة الآيات والتفسير
    const listContainer = document.getElementById('versesList');
    verses.forEach(v => {
        const card = document.createElement('div');
        card.className = 'verse-card';
        card.id = `verse-card-${v.num}`;
        card.innerHTML = `
            <div class="verse-header">
                <span class="verse-num">الآية ${v.num}</span>
                <button class="play-btn" onclick="playVerse(${v.num})">▶ تشغيل</button>
            </div>
            <div class="verse-text">${v.text}</div>
            
            <div class="tafsir-box">
                <div class="tafsir-title">💡 التفسير للأبطال:</div>
                ${v.tafsir}
            </div>

            <div class="time-inputs">
                <label>البداية (ثانية):</label>
                <input type="number" id="start-${v.num}" value="${v.start}" onchange="updateTime(${v.num})">
                <label>النهاية (ثانية):</label>
                <input type="number" id="end-${v.num}" value="${v.end}" onchange="updateTime(${v.num})">
            </div>
        `;
        listContainer.appendChild(card);
    });

    function updateTime(num) {
        const v = verses.find(item => item.num === num);
        if (v) {
            v.start = parseFloat(document.getElementById(`start-${num}`).value) || 0;
            v.end = parseFloat(document.getElementById(`end-${num}`).value) || 0;
        }
    }

    function playVerse(num) {
        // إزالة التظليل عن السابق
        document.querySelectorAll('.verse-card').forEach(c => c.classList.remove('playing'));
        
        currentVerse = verses.find(v => v.num === num);
        if (!currentVerse) return;

        document.getElementById(`verse-card-${num}`).classList.add('playing');
        
        player.currentTime = currentVerse.start;
        player.play();
    }

    function stopAudio() {
        player.pause();
    }

    function toggleLoop() {
        isLooping = !isLooping;
        const btn = document.getElementById('loopBtn');
        if (isLooping) {
            btn.classList.add('active');
            btn.innerText = '🔄 تكرار الآية: مفعل';
        } else {
            btn.classList.remove('active');
            btn.innerText = '🔄 تكرار الآية: إيقاف';
        }
    }

    // متابعة زمن التشغيل للتكرار والتنقل
    player.addEventListener('timeupdate', () => {
        if (currentVerse) {
            if (player.currentTime >= currentVerse.end) {
                if (isLooping) {
                    player.currentTime = currentVerse.start;
                    player.play();
                } else {
                    player.pause();
                }
            }
        }
    });
</script>

</body>
</html>
