<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>المعلم التفاعلي الذكي - سورة المجادلة</title>
    <style>
        :root {
            --primary: #0d9488;
            --primary-hover: #0f766e;
            --bg: #0f172a;
            --card-bg: #1e293b;
            --text: #f8fafc;
            --text-sub: #94a3b8;
            --accent: #f59e0b;
            --active-border: #38bdf8;
            --tafsir-bg: rgba(6, 78, 59, 0.45);
            --tafsir-text: #a7f3d0;
            --success: #10b981;
            --danger: #ef4444;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: system-ui, -apple-system, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg);
            color: var(--text);
            padding: 15px;
            direction: rtl;
            line-height: 1.6;
        }

        .container { max-width: 650px; margin: 0 auto; padding-bottom: 50px; }

        header {
            text-align: center;
            margin-bottom: 20px;
            padding: 15px;
            background: var(--card-bg);
            border-radius: 12px;
            border-top: 4px solid var(--primary);
        }

        h1 { font-size: 1.3rem; color: #5eead4; margin-bottom: 5px; }
        p.subtitle { font-size: 0.85rem; color: var(--text-sub); }

        .media-card {
            background: var(--card-bg);
            padding: 16px;
            border-radius: 12px;
            margin-bottom: 25px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.3);
            position: relative; 
        }

        .file-input-group label {
            display: block; font-size: 0.85rem; color: var(--text-sub); margin-bottom: 6px;
        }

        input[type="file"] {
            width: 100%; padding: 8px; border-radius: 8px;
            background: #0f172a; color: var(--text); border: 1px solid #334155; font-size: 0.85rem;
        }

        audio { width: 100%; margin-top: 10px; border-radius: 8px; }

        .controls { display: flex; gap: 10px; margin-top: 12px; flex-wrap: wrap; }

        .btn {
            background: var(--primary); color: white; border: none; padding: 10px 14px;
            border-radius: 8px; font-weight: bold; cursor: pointer; flex: 1;
            min-width: 120px; font-size: 0.9rem; transition: all 0.2s; text-align: center;
        }

        .btn-loop { background: #334155; color: var(--text); }
        .btn-loop.active { background: var(--accent); color: #000; }

        .verse-card {
            background: var(--card-bg); border-right: 4px solid var(--primary);
            padding: 18px; border-radius: 12px; margin-bottom: 20px; transition: border-color 0.2s;
        }

        .verse-card.playing { border-right-color: var(--active-border); box-shadow: 0 0 0 2px var(--active-border); }

        .verse-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; }

        .verse-num {
            background: var(--primary); color: white; padding: 3px 10px;
            border-radius: 20px; font-size: 0.85rem; font-weight: bold;
        }

        .action-btns { display: flex; gap: 8px; }

        .play-btn, .rec-btn {
            background: #334155; color: #5eead4; border: 1px solid var(--primary);
            padding: 6px 12px; border-radius: 8px; font-size: 0.8rem; cursor: pointer; font-weight: bold;
        }

        .rec-btn { color: #f59e0b; border-color: #f59e0b; }

        .rec-btn.recording {
            background: #ef4444; color: white; border-color: #ef4444;
            animation: pulse 1s infinite;
        }

        @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.6; } 100% { opacity: 1; } }

        .verse-text { font-size: 1.25rem; line-height: 2.2; color: #f1f5f9; text-align: justify; margin-bottom: 10px; }

        .tafsir-box {
            background: var(--tafsir-bg); border: 1px solid #10b981; padding: 12px;
            border-radius: 8px; margin-top: 10px; font-size: 0.9rem; color: var(--tafsir-text); line-height: 1.6;
        }

        .speech-feedback { margin-top: 10px; padding: 10px; border-radius: 8px; font-size: 0.85rem; display: none; }
        .speech-feedback.success { background: rgba(16, 185, 129, 0.2); border: 1px solid var(--success); color: #6ee7b7; }
        .speech-feedback.warning { background: rgba(245, 158, 11, 0.2); border: 1px solid var(--accent); color: #fde047; }

        .time-inputs { display: flex; gap: 10px; margin-top: 12px; font-size: 0.8rem; color: var(--text-sub); align-items: center; }
        .time-inputs input { width: 60px; padding: 4px; background: #0f172a; border: 1px solid #334155; color: var(--text); border-radius: 4px; text-align: center; }
    </style>
</head>
<body>

<div class="container">
    <header>
        <h1>📖 المعلم الذكي - سورة المجادلة</h1>
        <p class="subtitle">اضغط الميكروفون للتسجيل واضغط مرة أخرى لإيقافه والاستماع إلى تقييم المعلم!</p>
    </header>

    <div class="media-card">
        <div class="file-input-group">
            <label>اختر ملف الصوت من جهازك (ملف MP3 للسورة):</label>
            <input type="file" id="audioFileInput" accept="audio/*">
        </div>

        <audio id="audioPlayer" controls>
            <source id="audioSource" src="audio.mp3" type="audio/mpeg">
        </audio>
        
        <div class="controls">
            <button class="btn btn-loop" id="loopBtn" onclick="toggleLoop()">🔄 تكرار الآية: إيقاف</button>
            <button class="btn" onclick="stopAudio()">⏹️ إيقاف مؤقت</button>
        </div>
    </div>

    <div id="versesList"></div>
</div>

    const player = document.getElementById('audioPlayer');
    const audioFileInput = document.getElementById('audioFileInput');
    let currentVerse = null;
    let isLooping = false;

    audioFileInput.addEventListener('change', function(e) {
        const file = e.target.files[0];
        if (file) {
            player.src = URL.createObjectURL(file);
            player.play();
        }
    });

    const listContainer = document.getElementById('versesList');
    verses.forEach(v => {
        const card = document.createElement('div');
        card.className = 'verse-card';
        card.id = `verse-card-${v.num}`;
        card.innerHTML = `
            <div class="verse-header">
                <span class="verse-num">الآية ${v.num}</span>
                <div class="action-btns">
                    <button class="play-btn" onclick="playVerse(${v.num})">▶ تشغيل</button>
                    <button class="rec-btn" id="rec-btn-${v.num}" onclick="toggleRec(${v.num})">🎤 بدء التسميع</button>
                </div>
            </div>
            <div class="verse-text">${v.displayText}</div>
            <div class="tafsir-box"><div class="tafsir-title">📖 التفسير والفوائد:</div>${v.tafsir}</div>
            <div class="speech-feedback" id="feedback-${v.num}"></div>
            <div class="time-inputs">
                <label>البداية (ث):</label><input type="number" id="start-${v.num}" value="${v.start}" onchange="updateTime(${v.num})">
                <label>النهاية (ث):</label><input type="number" id="end-${v.num}" value="${v.end}" onchange="updateTime(${v.num})">
            </div>
        `;
        listContainer.appendChild(card);
    });

    function updateTime(num) {
        const v = verses.find(item => item.num === num);
        if (v) {
            v.start = parseFloat(document.getElementById(`start-${num}`).value) || 0;
            v.end = parseFloat(document.getElementById(`end-${num}`).value) || 0;
        }
    }

    function playVerse(num) {
        document.querySelectorAll('.verse-card').forEach(c => c.classList.remove('playing'));
        currentVerse = verses.find(v => v.num === num);
        if (!currentVerse) return;

        document.getElementById(`verse-card-${num}`).classList.add('playing');
        player.currentTime = currentVerse.start;
        player.play();
    }

    function stopAudio() { player.pause(); }

    function toggleLoop() {
        isLooping = !isLooping;
        const btn = document.getElementById('loopBtn');
        if (isLooping) {
            btn.classList.add('active');
            btn.innerText = '🔄 تكرار الآية: مفعل';
        } else {
            btn.classList.remove('active');
            btn.innerText = '🔄 تكرار الآية: إيقاف';
        }
    }

    player.addEventListener('timeupdate', () => {
        if (currentVerse && player.currentTime >= currentVerse.end) {
            if (isLooping) { player.currentTime = currentVerse.start; player.play(); }
            else { player.pause(); }
        }
    });

    // ==================== التسجيل الصوتي بالتحكم اليدوي والرد الصوتي ====================
    const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
    let activeRecognition = null;
    let activeVerseNum = null;

    function toggleRec(num) {
        if (!SpeechRecognition) {
            alert("متصفحك لا يدعم ميزة التعرف على الصوت. يرجى استخدام متصفح Chrome.");
            return;
        }

        const btn = document.getElementById(`rec-btn-${num}`);
        const feedback = document.getElementById(`feedback-${num}`);
        const targetVerse = verses.find(v => v.num === num);

        // إذا كان التسجيل يعمل لنفس الآية وقام المستخدم بالضغط مجدداً لإيقافه
        if (activeRecognition && activeVerseNum === num) {
            activeRecognition.stop();
            return;
        }

        // إذا كان يقرأ لآية أخرى، أوقف القديم أولاً
        if (activeRecognition) {
            activeRecognition.stop();
        }

        activeVerseNum = num;
        activeRecognition = new SpeechRecognition();
        activeRecognition.lang = 'ar-SA';
        activeRecognition.interimResults = false;

        btn.classList.add('recording');
        btn.innerText = "⏹️ إيقاف وتقييم";
        feedback.style.display = 'block';
        feedback.className = 'speech-feedback warning';
        feedback.innerHTML = "🎙️ يستمع الآن... اقرأ الآية وعندما تنتهي اضغط نفس الزر للإيقاف.";

        activeRecognition.start();

        activeRecognition.onresult = function(event) {
            const spokenText = event.results[0][0].transcript;
            const cleanSpoken = cleanText(spokenText);
            const cleanOriginal = cleanText(targetVerse.text);

            let feedbackMsg = "";
            let voiceMsg = "";

            if (cleanOriginal.includes(cleanSpoken) || cleanSpoken.includes(cleanOriginal) || similarity(cleanSpoken, cleanOriginal) > 0.55) {
                feedback.className = 'speech-feedback success';
                feedbackMsg = `<b>🌟 ممتاز جداً! قراءة صحيحة ومتقنة.</b><br>النص المسموع: "${spokenText}"`;
                voiceMsg = "أحسنت يا بطل! قراءة ممتازة ونطق صحيح ومتقن للآية.";
            } else {
                feedback.className = 'speech-feedback warning';
                feedbackMsg = `<b>⚠️ محاولة جيدة! تحتاج إعادة تركيز.</b><br>النص المسموع: "${spokenText}"<br>💡 استمع للآية من القارئ مرة أخرى لضبط النطق.`;
                voiceMsg = "محاولة جيدة، لكن توجد بعض الأخطاء في النطق. استمع للآية جيداً وحاول مرة أخرى.";
            }

            feedback.innerHTML = feedbackMsg;
            speakFeedback(voiceMsg);
        };

        activeRecognition.onerror = function() {
            feedback.className = 'speech-feedback warning';
            feedback.innerHTML = "❌ لم نتمكن من التقاط الصوت بوضوح، اضغط على الزر وحاول مرة أخرى.";
            speakFeedback("لم نتمكن من سماع الصوت بوضوح، حاول التسميع مرة أخرى.");
        };

        activeRecognition.onend = function() {
            btn.classList.remove('recording');
            btn.innerText = "🎤 بدء التسميع";
            activeRecognition = null;
            activeVerseNum = null;
        };
    }

    // النطق الصوتي للرد والتوجيه (Text-To-Speech)
    function speakFeedback(text) {
        if ('speechSynthesis' in window) {
            window.speechSynthesis.cancel(); // إيقاف أي صوت سابق
            const utterance = new SpeechSynthesisUtterance(text);
            utterance.lang = 'ar-SA';
            utterance.rate = 0.95;
            window.speechSynthesis.speak(utterance);
        }
    }

    function cleanText(text) {
        return text.replace(/[\u064B-\u0652]/g, "")
                   .replace(/[أإآ]/g, "ا")
                   .replace(/ة/g, "ه")
                   .replace(/[^\w\sء-ي]/gi, '')
                   .trim();
    }

    function similarity(s1, s2) {
        let longer = s1, shorter = s2;
        if (s1.length < s2.length) { longer = s2; shorter = s1; }
        let longerLength = longer.length;
        if (longerLength == 0) return 1.0;
        return (longerLength - editDistance(longer, shorter)) / parseFloat(longerLength);
    }

    function editDistance(s1, s2) {
        s1 = s1.toLowerCase(); s2 = s2.toLowerCase();
        let costs = new Array();
        for (let i = 0; i <= s1.length; i++) {
            let lastValue = i;
            for (let j = 0; j <= s2.length; j++) {
                if (i == 0) costs[j] = j;
                else if (j > 0) {
                    let newValue = costs[j - 1];
                    if (s1.charAt(i - 1) != s2.charAt(j - 1))
                        newValue = Math.min(Math.min(newValue, lastValue), costs[j]) + 1;
                    costs[j - 1] = lastValue;
                    lastValue = newValue;
                }
            }
            if (i > 0) costs[s2.length] = lastValue;
        }
        return costs[s2.length];
    }
</script>
